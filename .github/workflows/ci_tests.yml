# SPDX-License-Identifier: Apache-2.0 WITH LLVM-exception

name: Continuous Integration Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '52 17 * * 3'

jobs:
  beman-submodule-check:
    uses: bemanproject/infra-workflows/.github/workflows/reusable-beman-submodule-check.yml@1.5.0

  preset-test:
    uses: bemanproject/infra-workflows/.github/workflows/reusable-beman-preset-test.yml@1.5.0
    with:
      matrix_config: >
        [
          {"preset": "gcc-debug", "image": "ghcr.io/bemanproject/infra-containers-gcc:latest"},
          {"preset": "gcc-release", "image": "ghcr.io/bemanproject/infra-containers-gcc:latest"},
          {"preset": "llvm-debug", "image": "ghcr.io/bemanproject/infra-containers-clang:latest"},
          {"preset": "llvm-release", "image": "ghcr.io/bemanproject/infra-containers-clang:latest"},
          {"preset": "appleclang-debug", "runner": "macos-latest"},
          {"preset": "appleclang-release", "runner": "macos-latest"}
        ]

  build-and-test:
    uses: bemanproject/infra-workflows/.github/workflows/reusable-beman-build-and-test.yml@1.5.0
    with:
      matrix_config: >
        {
          "gcc": [
            { "versions": ["14"],
              "tests": [
                { "cxxversions": ["c++23", "c++20"],
                  "tests": [
                    { "stdlibs": ["libstdc++"],
                      "tests": [
                        "Release.Default",
                        "Release.TSan", "Release.ASan",
                        "Release.-DBEMAN_INPLACE_VECTOR_NO_EXCEPTIONS=ON"
                      ]
                    }
                  ]
                },
                { "cxxversions": ["c++20"],
                  "tests": [
                    { "stdlibs": ["libstdc++"],
                      "tests": [
                        "Release.Dynamic"
                      ]
                    }
                  ]
                }
              ]
            }
          ],
          "clang": [
            { "versions": ["20"],
              "tests": [
                { "cxxversions": ["c++23", "c++20"],
                  "tests": [
                    { "stdlibs": ["libstdc++"],
                      "tests": [
                        "Release.Default",
                        "Release.TSan", "Release.ASan",
                        "Release.-DBEMAN_INPLACE_VECTOR_NO_EXCEPTIONS=ON"
                      ]
                    }
                  ]
                }
              ]
            }
          ]
        }

  create-issue-when-fault:
    needs: [preset-test, build-and-test]
    if: failure() && github.event_name == 'schedule'
    uses: bemanproject/infra-workflows/.github/workflows/reusable-beman-create-issue-when-fault.yml@1.5.0
